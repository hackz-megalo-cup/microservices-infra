apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reloader
  namespace: argocd
spec:
  destination:
    namespace: kube-system
    server: https://kubernetes.default.svc
  project: default
  source:
    path: ./manifests/reloader
    repoURL: https://github.com/thirdlf03/microservice-infra
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

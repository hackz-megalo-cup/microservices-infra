apiVersion: v1
kind: Service
metadata:
  annotations: {}
  labels:
    app.kubernetes.io/component: redpanda
    app.kubernetes.io/instance: redpanda
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: redpanda
    helm.sh/chart: redpanda-25.3.2
    monitoring.redpanda.com/enabled: "true"
  name: redpanda
  namespace: messaging
spec:
  clusterIP: None
  ports:
    - name: admin
      port: 9644
      protocol: TCP
      targetPort: 9644
    - name: kafka
      port: 9092
      protocol: TCP
      targetPort: 9092
    - name: rpc
      port: 33145
      protocol: TCP
      targetPort: 33145
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/instance: redpanda
    app.kubernetes.io/name: redpanda
  type: ClusterIP

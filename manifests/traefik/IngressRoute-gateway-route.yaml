apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gateway-route
  namespace: microservices
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: PathPrefix(`/gateway.v1.GatewayService`)
      middlewares:
        - name: cors-middleware
        - name: rate-limit-middleware
      priority: 100
      services:
        - name: gateway
          port: 8082
          scheme: h2c

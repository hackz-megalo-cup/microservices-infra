apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: image-updater
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    path: ./manifests/image-updater
    repoURL: https://github.com/thirdlf03/microservice-infra
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: greeter-route
  namespace: microservices
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: PathPrefix(`/greeter.v1.GreeterService`)
      middlewares:
        - name: cors-middleware
        - name: rate-limit-middleware
      priority: 100
      services:
        - name: greeter-service
          port: 80
          scheme: h2c

apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/component: redpanda
    app.kubernetes.io/instance: redpanda
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: redpanda
    helm.sh/chart: redpanda-25.3.2
  name: redpanda
  namespace: messaging
spec:
  podManagementPolicy: Parallel
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: redpanda-statefulset
      app.kubernetes.io/instance: redpanda
      app.kubernetes.io/name: redpanda
  serviceName: redpanda
  template:
    metadata:
      annotations:
        config.redpanda.com/checksum: 72824f5d45cf82953003ed015cc45552805b4fe2100f32b7a5ff6c61fe260b51
      labels:
        app.kubernetes.io/component: redpanda-statefulset
        app.kubernetes.io/instance: redpanda
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: redpanda
        cluster.redpanda.com/broker: "true"
        helm.sh/chart: redpanda-25.3.2
        redpanda.com/poddisruptionbudget: redpanda
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/component: redpanda-statefulset
                  app.kubernetes.io/instance: redpanda
                  app.kubernetes.io/name: redpanda
              topologyKey: kubernetes.io/hostname
      automountServiceAccountToken: false
      containers:
        - command:
            - rpk
            - redpanda
            - start
            - --advertise-rpc-addr=$(SERVICE_NAME).redpanda.messaging.svc.cluster.local.:33145
          env:
            - name: SERVICE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          image: docker.redpanda.com/redpandadata/redpanda:v25.3.6
          lifecycle:
            postStart:
              exec:
                command:
                  - bash
                  - -c
                  - 'timeout -v 45 bash -x /var/lifecycle/postStart.sh 2>&1 | sed "s/^/lifecycle-hook post-start $(date): /" | tee /proc/1/fd/1; true'
            preStop:
              exec:
                command:
                  - bash
                  - -c
                  - 'timeout -v 45 bash -x /var/lifecycle/preStop.sh 2>&1 | sed "s/^/lifecycle-hook pre-stop $(date): /" | tee /proc/1/fd/1; true'
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - curl --silent --fail -k -m 5  "http://${SERVICE_NAME}.redpanda.messaging.svc.cluster.local.:9644/v1/status/ready"
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 10
          name: redpanda
          ports:
            - containerPort: 9644
              name: admin
            - containerPort: 9645
              name: admin-default
            - containerPort: 8082
              name: http
            - containerPort: 8083
              name: http-default
            - containerPort: 9092
              name: kafka
            - containerPort: 9094
              name: kafka-default
            - containerPort: 33145
              name: rpc
            - containerPort: 8081
              name: schemaregistry
            - containerPort: 8084
              name: schema-default
          resources:
            limits:
              cpu: "0.5"
              memory: 2Gi
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  RESULT=$(curl --silent --fail -k -m 5  "http://${SERVICE_NAME}.redpanda.messaging.svc.cluster.local.:9644/v1/status/ready")
                  echo $RESULT
                  echo $RESULT | grep ready
            failureThreshold: 120
            initialDelaySeconds: 1
            periodSeconds: 10
          volumeMounts:
            - mountPath: /etc/redpanda
              name: config
            - mountPath: /tmp/base-config
              name: base-config
            - mountPath: /var/lifecycle
              name: lifecycle-scripts
            - mountPath: /var/lib/redpanda/data
              name: datadir
            - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              name: kube-api-access
              readOnly: true
        - args:
            - supervisor
            - --
            - /redpanda-operator
            - sidecar
            - --redpanda-yaml
            - /etc/redpanda/redpanda.yaml
            - --redpanda-cluster-namespace
            - messaging
            - --redpanda-cluster-name
            - redpanda
            - --selector=helm.sh/chart=redpanda-25.3.2,app.kubernetes.io/name=redpanda,app.kubernetes.io/instance=redpanda
            - --run-broker-probe
            - --broker-probe-broker-url
            - $(SERVICE_NAME).redpanda.messaging.svc.cluster.local.:9644
          command:
            - /redpanda-operator
          env:
            - name: SERVICE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          image: docker.redpanda.com/redpandadata/redpanda-operator:v25.3.1
          name: sidecar
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8093
            initialDelaySeconds: 1
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 0
          resources: {}
          volumeMounts:
            - mountPath: /etc/redpanda
              name: config
            - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              name: kube-api-access
              readOnly: true
      imagePullSecrets: []
      initContainers:
        - command:
            - /bin/bash
            - -c
            - trap "exit 0" TERM; exec $CONFIGURATOR_SCRIPT "${SERVICE_NAME}" "${KUBERNETES_NODE_NAME}" & wait $!
          env:
            - name: CONFIGURATOR_SCRIPT
              value: /etc/secrets/configurator/scripts/configurator.sh
            - name: SERVICE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KUBERNETES_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HOST_IP_ADDRESS
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.hostIP
          image: docker.redpanda.com/redpandadata/redpanda:v25.3.6
          name: redpanda-configurator
          resources: {}
          volumeMounts:
            - mountPath: /etc/redpanda
              name: config
            - mountPath: /tmp/base-config
              name: base-config
            - mountPath: /etc/secrets/configurator/scripts/
              name: redpanda-configurator
        - command:
            - /redpanda-operator
            - bootstrap
            - --in-dir
            - /tmp/base-config
            - --out-dir
            - /tmp/config
          image: docker.redpanda.com/redpandadata/redpanda-operator:v25.3.1
          name: bootstrap-yaml-envsubst
          resources:
            limits:
              cpu: 100m
              memory: 125Mi
            requests:
              cpu: 100m
              memory: 125Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          volumeMounts:
            - mountPath: /tmp/config/
              name: config
            - mountPath: /tmp/base-config/
              name: base-config
      nodeSelector: {}
      priorityClassName: ""
      securityContext:
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
        runAsUser: 101
      serviceAccountName: redpanda
      terminationGracePeriodSeconds: 90
      tolerations: []
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: redpanda-statefulset
              app.kubernetes.io/instance: redpanda
              app.kubernetes.io/name: redpanda
          maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
      volumes:
        - name: lifecycle-scripts
          secret:
            defaultMode: 509
            secretName: redpanda-sts-lifecycle
        - configMap:
            name: redpanda
          name: base-config
        - emptyDir: {}
          name: config
        - name: redpanda-configurator
          secret:
            defaultMode: 509
            secretName: redpanda-configurator
        - name: datadir
          persistentVolumeClaim:
            claimName: datadir
        - name: kube-api-access
          projected:
            defaultMode: 420
            sources:
              - serviceAccountToken:
                  expirationSeconds: 3607
                  path: token
              - configMap:
                  items:
                    - key: ca.crt
                      path: ca.crt
                  name: kube-root-ca.crt
              - downwardAPI:
                  items:
                    - fieldRef:
                        apiVersion: v1
                        fieldPath: metadata.namespace
                      path: namespace
  updateStrategy:
    type: RollingUpdate
  volumeClaimTemplates:
    - metadata:
        labels:
          app.kubernetes.io/component: redpanda
          app.kubernetes.io/instance: redpanda
          app.kubernetes.io/name: redpanda
        name: datadir
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
      status: {}

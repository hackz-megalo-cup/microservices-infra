apiVersion: v1
data:
  config.yaml: |
    # from .Values.config
    kafka:
      brokers:
      - redpanda-0.redpanda.messaging.svc.cluster.local.:9092
    redpanda:
      adminApi:
        enabled: true
        urls:
        - http://redpanda.messaging.svc.cluster.local.:9644
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: redpanda
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: console
    app.kubernetes.io/version: v3.3.2
    helm.sh/chart: console-3.3.0
  name: redpanda-console
  namespace: messaging

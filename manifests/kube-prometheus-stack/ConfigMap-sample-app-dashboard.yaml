apiVersion: v1
data:
  sample-app.json: |
    {
       "description": "Observability dashboard for the sample-app (OTel instrumented)",
       "graphTooltip": 1,
       "panels": [
          {
             "datasource": {
                "type": "datasource",
                "uid": "-- Mixed --"
             },
             "fieldConfig": {
                "defaults": {
                   "unit": "reqps"
                }
             },
             "gridPos": {
                "h": 8,
                "w": 12,
                "x": 0,
                "y": 0
             },
             "id": 1,
             "pluginVersion": "v11.4.0",
             "targets": [
                {
                   "datasource": {
                      "type": "prometheus",
                      "uid": "Prometheus"
                   },
                   "expr": "sum(rate(sample_app_requests_total{job=\"sample-app\"}[$__rate_interval])) by (endpoint)",
                   "legendFormat": "{{ endpoint }}"
                }
             ],
             "title": "Request Rate",
             "type": "timeseries"
          },
          {
             "datasource": {
                "type": "datasource",
                "uid": "-- Mixed --"
             },
             "fieldConfig": {
                "defaults": {
                   "unit": "percentunit"
                }
             },
             "gridPos": {
                "h": 8,
                "w": 12,
                "x": 12,
                "y": 0
             },
             "id": 2,
             "pluginVersion": "v11.4.0",
             "targets": [
                {
                   "datasource": {
                      "type": "prometheus",
                      "uid": "Prometheus"
                   },
                   "expr": "sum(rate(http_server_duration_milliseconds_count{job=\"sample-app\", http_status_code=~\"5..\"}[$__rate_interval])) / sum(rate(http_server_duration_milliseconds_count{job=\"sample-app\"}[$__rate_interval]))",
                   "legendFormat": "Error Rate"
                }
             ],
             "title": "Error Rate",
             "type": "timeseries"
          },
          {
             "datasource": {
                "type": "datasource",
                "uid": "-- Mixed --"
             },
             "fieldConfig": {
                "defaults": {
                   "unit": "ms"
                }
             },
             "gridPos": {
                "h": 8,
                "w": 16,
                "x": 0,
                "y": 8
             },
             "id": 3,
             "pluginVersion": "v11.4.0",
             "targets": [
                {
                   "datasource": {
                      "type": "prometheus",
                      "uid": "Prometheus"
                   },
                   "expr": "histogram_quantile(0.99, sum(rate(http_server_duration_milliseconds_bucket{job=\"sample-app\"}[$__rate_interval])) by (le))",
                   "legendFormat": "p99"
                },
                {
                   "datasource": {
                      "type": "prometheus",
                      "uid": "Prometheus"
                   },
                   "expr": "histogram_quantile(0.50, sum(rate(http_server_duration_milliseconds_bucket{job=\"sample-app\"}[$__rate_interval])) by (le))",
                   "legendFormat": "p50"
                }
             ],
             "title": "HTTP Request Duration",
             "type": "timeseries"
          },
          {
             "datasource": {
                "type": "datasource",
                "uid": "-- Mixed --"
             },
             "fieldConfig": {
                "defaults": {
                   "unit": "reqps"
                }
             },
             "gridPos": {
                "h": 8,
                "w": 8,
                "x": 16,
                "y": 8
             },
             "id": 4,
             "pluginVersion": "v11.4.0",
             "targets": [
                {
                   "datasource": {
                      "type": "prometheus",
                      "uid": "Prometheus"
                   },
                   "expr": "sum(rate(http_server_duration_milliseconds_count{job=\"sample-app\"}[$__rate_interval]))",
                   "legendFormat": "Total RPS"
                }
             ],
             "title": "Total Request Rate",
             "type": "stat"
          }
       ],
       "refresh": "30s",
       "schemaVersion": 39,
       "tags": [
          "sample-app",
          "otel"
       ],
       "time": {
          "from": "now-6h",
          "to": "now"
       },
       "timezone": "utc",
       "title": "Sample App Overview",
       "uid": "sample-app-overview"
    }
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: "1"
  name: sample-app-dashboard
  namespace: observability
